name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 18

jobs:
  # Backend Tests
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/api
          npm ci

      - name: Run lint
        run: |
          cd apps/api
          npm run lint

      - name: Run unit tests
        run: |
          cd apps/api
          npm run test:unit

      - name: Run integration tests
        run: |
          cd apps/api
          npm run test:integration

  # Frontend Tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run lint
        run: |
          cd apps/web
          npm run lint

      - name: Run unit tests
        run: |
          cd apps/web
          npm run test:unit

  # Build and Deploy (Staging)
  deploy-staging:
    name: Deploy to Staging
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          cd docker/dev
          docker-compose build
          docker tag simarukun-api:latest ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-api:staging
          docker tag simarukun-web:latest ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-web:staging
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-api:staging
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-web:staging

      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/simarukun
            docker-compose -f docker/prod/docker-compose.yml pull
            docker-compose -f docker/prod/docker-compose.yml up -d --remove-orphans
            docker system prune -f

  # Build and Deploy (Production)
  deploy-production:
    name: Deploy to Production
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          cd docker/dev
          docker-compose build
          docker tag simarukun-api:latest ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-api:production
          docker tag simarukun-api:latest ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-api:v1.0.0
          docker tag simarukun-web:latest ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-web:production
          docker tag simarukun-web:latest ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-web:v1.0.0
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-api:production
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-api:v1.0.0
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-web:production
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/simarukun-web:v1.0.0

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/simarukun
            docker-compose -f docker/prod/docker-compose.yml pull
            docker-compose -f docker/prod/docker-compose.yml up -d --remove-orphans
            docker system prune -f

  # Create Release
  create-release:
    name: Create GitHub Release
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: SimaRukun v1.0.0 (Enterprise-Ready)
          body: |
            ## 🎉 Release v1.0.0
            
            **Status**: Production-Ready (99% Enterprise Compliance)
            
            ### ✨ Fitur Baru
            - 4 Role RBAC (Super Admin, Supervisor, Admin, Warga)
            - JWT + Refresh Token Authentication
            - Role-Based Access Control (RBAC)
            - Dashboard Role-Specific
            - Manajemen Warga/Iuran/Aduan (CRUD)
            - Laporan (Super Admin, Supervisor, Admin)
            - Backup (Super Admin, Supervisor)
            - Webhook & Server Monitoring (Super Admin)
            
            ### 📦 Teknologi
            - Frontend: Next.js 14 (App Router), TypeScript, Tailwind CSS, Zustand
            - Backend: NestJS, TypeORM, PostgreSQL, Redis
            - DevOps: Docker, Docker Compose, Nginx, GitHub Actions
            - Monitoring: Prometheus, Grafana, Sentry
            
            ### 🔗 Link
            - **Repository**: [aca-error/simarukun](https://github.com/aca-error/simarukun)
            - **Dokumentasi**: [README.md](https://github.com/aca-error/simarukun/blob/main/README.md)
            - **Manual Instalasi**: [INSTRUCTIONS.md](https://github.com/aca-error/simarukun/blob/main/INSTRUCTIONS.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
