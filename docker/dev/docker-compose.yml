version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: simarukun-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simarukun_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - simarukun-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: simarukun-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - simarukun-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API (NestJS)
  api:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.api
    container_name: simarukun-api-dev
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: simarukun_dev
      JWT_SECRET: your_very_strong_jwt_secret_here_min_32_chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - simarukun-network-dev
    restart: unless-stopped
    command: npm run start:dev

  # Frontend Web (Next.js)
  web:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile.web
    container_name: simarukun-web-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../../apps/web:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - simarukun-network-dev
    restart: unless-stopped
    command: npm run dev

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: simarukun-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
      - api
    networks:
      - simarukun-network-dev
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  simarukun-network-dev:
    driver: bridge
