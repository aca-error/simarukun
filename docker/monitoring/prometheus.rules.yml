groups:
# API Alerts
- name: api-alerts
  interval: 15s
  rules:
  - alert: HighErrorRate5xx
    expr: rate(http_requests_total{status=~"5.."}[1m]) / rate(http_requests_total[1m]) > 0.01
    for: 5m
    labels:
      severity: critical
      category: api
    annotations:
      summary: "High 5xx error rate on {{ $labels.instance }}"
      description: "5xx error rate is {{ printf \"%.2f\" $value }}% (threshold: 1%)"
      impact: "API may be experiencing critical failures"
      action: "Check API logs and server status immediately"

  - alert: HighErrorRate4xx
    expr: rate(http_requests_total{status=~"4.."}[1m]) / rate(http_requests_total[1m]) > 0.05
    for: 10m
    labels:
      severity: warning
      category: api
    annotations:
      summary: "High 4xx error rate on {{ $labels.instance }}"
      description: "4xx error rate is {{ printf \"%.2f\" $value }}% (threshold: 5%)"

  - alert: HighResponseTime
    expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[1m])) by (le)) > 1
    for: 5m
    labels:
      severity: warning
      category: api
    annotations:
      summary: "High response time (95th percentile > 1s)"
      description: "Response time is {{ printf \"%.2f\" $value }}s"

# Database Alerts
- name: database-alerts
  interval: 30s
  rules:
  - alert: HighDBConnections
    expr: pg_stat_activity_count > 50
    for: 5m
    labels:
      severity: warning
      category: database
    annotations:
      summary: "High database connection usage"
      description: "Connections: {{ printf \"%.0f\" $value }} (threshold: 50)"

  - alert: HighQueryTime
    expr: rate(pg_query_duration_seconds_sum[5m]) / rate(pg_query_duration_seconds_count[5m]) > 0.5
    for: 5m
    labels:
      severity: warning
      category: database
    annotations:
      summary: "High database query time"
      description: "Average query time: {{ printf \"%.2f\" $value }}s"

# Server Alerts
- name: server-alerts
  interval: 15s
  rules:
  - alert: HighCPUUsage
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
    for: 5m
    labels:
      severity: critical
      category: server
    annotations:
      summary: "High CPU usage on {{ $labels.instance }}"
      description: "CPU usage: {{ printf \"%.1f\" $value }}%"

  - alert: HighMemoryUsage
    expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 80
    for: 5m
    labels:
      severity: critical
      category: server
    annotations:
      summary: "High memory usage on {{ $labels.instance }}"
      description: "Memory usage: {{ printf \"%.1f\" $value }}%"

  - alert: LowDiskSpace
    expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100 < 20
    for: 5m
    labels:
      severity: critical
      category: server
    annotations:
      summary: "Low disk space on {{ $labels.instance }}"
      description: "Available: {{ printf \"%.1f\" $value }}%"

# Monitoring Stack Alerts
- name: monitoring-alerts
  interval: 30s
  rules:
  - alert: PrometheusDown
    expr: up{job="prometheus"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Prometheus is down"

  - alert: GrafanaDown
    expr: up{job="grafana"} == 0
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Grafana is down"

  - alert: LokiDown
    expr: up{job="loki"} == 0
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Loki is down"
